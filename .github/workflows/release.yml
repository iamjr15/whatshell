name: Release (npm OIDC Trusted Publishing)

on:
  push:
    tags:
      - "v*"

# id-token: write is REQUIRED for npm OIDC Trusted Publishing.
# contents: read is enough — this job does NOT create a GitHub Release.
permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Build, test, and publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Rust is needed because the package's build/test compile the binary
      # (Cargo.toml uses edition 2024, requiring a modern stable toolchain).
      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm supports OIDC Trusted Publishing (>= 11.5.1)
        run: npm install -g npm@latest

      - name: Verify tag matches package.json version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Build release binary (cargo)
        run: npm run build

      - name: Run tests (cargo test + skill install test)
        run: npm test

      # No NODE_AUTH_TOKEN env on purpose — a static token would preempt OIDC.
      # npm exchanges the GitHub OIDC token automatically; --provenance explicit.
      - name: Publish to npm with provenance via OIDC
        run: npm publish --provenance --access public
